services:
  startax-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: startax/backend-api:latest
    container_name: startax-backend-container
    restart: always
    ports:
      - "5400:5400"
    environment:
      - PORT=5400
      - NODE_ENV=development
      - MONGO_URL=mongodb://startax-mongo-container:27017/startax_db
      - MONGO_DB_NAME=startax_db
      - MONGO_FISCAL_PARAMETERS_COLLECTION=parametres_fiscaux
      - AUTO_SEED_FISCAL_PARAMS=true
      # Passer à true pour forcer un re-seed complet (efface le flag)
      - FORCE_RESEED=false
      # Origines CORS autorisées (séparées par virgule)
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
      # JWT — changer en production
      - JWT_SECRET=fiscpredict-secret-2026
      - JWT_EXPIRES_IN=24h
    volumes:
      - .:/app
    depends_on:
      - startax-mongodb
    networks:
      - startax-network

  startax-mongodb:
    image: mongo:6.0
    container_name: startax-mongo-container
    restart: always
    environment:
      MONGO_INITDB_DATABASE: startax_db
    volumes:
      - ./mongo-data:/data/db
    ports:
      - "5401:27017"
    networks:
      - startax-network

networks:
  startax-network:
    driver: bridge